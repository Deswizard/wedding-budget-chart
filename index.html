<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Budget Dashboard</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<style>
  body {
    font-family: Arial, sans-serif;
    padding: 20px;
    text-align: center;
  }

  .wrap {
    max-width: 420px;
    margin: 0 auto;
  }

  h1 {
    font-size: 18px;
    margin-bottom: 10px;
  }

  #total {
    font-size: 22px;
    margin: 10px 0 20px;
  }

  canvas {
    height: 300px;
    width: 100%;
  }

  button {
    margin-bottom: 15px;
    padding: 6px 10px;
    font-size: 12px;
    cursor: pointer;
  }

  .note {
    font-size: 11px;
    color: #888;
    margin-top: 15px;
  }
</style>
</head>

<body>

<div class="wrap">
  <h1>Wedding Budget Breakdown</h1>

  <button onclick="loadData()">Refresh from Notion</button>

  <div id="total">$0</div>

  <canvas id="chart"></canvas>

  <div class="note">
    Estimated costs for planning purposes only.
  </div>
</div>

<script>
let chart;

function initChart() {
  const ctx = document.getElementById("chart");

  chart = new Chart(ctx, {
    type: "doughnut",
    data: {
      labels: ["Loading"],
      datasets: [{
        data: [1],
        backgroundColor: ["#ddd"]
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: "62%",
      plugins: {
        legend: { display: false }
      }
    }
  });
}

function render(data) {
  const totals = data?.totals || {};
  const categories = Object.keys(totals);
  const values = categories.map(c => totals[c]);

  if (categories.length === 0) {
    chart.data.labels = ["No Data"];
    chart.data.datasets[0].data = [1];
    chart.data.datasets[0].backgroundColor = ["#ddd"];
    chart.update();

    document.getElementById("total").innerText = "$0";
    return;
  }

  chart.data.labels = categories;
  chart.data.datasets[0].data = values;

  chart.data.datasets[0].backgroundColor = categories.map(
    (_, i) => `hsl(${i * 35}, 70%, 60%)`
  );

  chart.update();

  const total = values.reduce((a, b) => a + b, 0);
  document.getElementById("total").innerText =
    "$" + Math.round(total).toLocaleString();
}

async function loadData() {
  try {
    const res = await fetch("/api/get-budget?t=" + Date.now());
    const data = await res.json();
    render(data);
  } catch (err) {
    console.error(err);

    chart.data.labels = ["Error"];
    chart.data.datasets[0].data = [1];
    chart.data.datasets[0].backgroundColor = ["#ccc"];
    chart.update();

    document.getElementById("total").innerText = "$0";
  }
}

window.addEventListener("DOMContentLoaded", () => {
  initChart();
  loadData();
});
</script>

</body>
</html>
