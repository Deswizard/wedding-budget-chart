<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Budget Dashboard</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<style>
  body {
    font-family: Arial, sans-serif;
    padding: 20px;
    text-align: center;
  }

  .box {
    max-width: 400px;
    margin: 0 auto;
  }

  canvas {
    max-width: 100%;
    height: 300px;
  }

  .total {
    font-size: 20px;
    margin: 10px 0;
  }
</style>
</head>

<body>

<div class="box">
  <h1>Wedding Budget</h1>

  <div class="total" id="total">$0</div>

  <canvas id="chart"></canvas>
</div>

<script>
console.log("loaded");

const ctx = document.getElementById("chart");

const chart = new Chart(ctx, {
  type: "doughnut",
  data: {
    labels: ["Test"],
    datasets: [{
      data: [100],
      backgroundColor: ["#4a90e2"]
    }]
  }
});

document.getElementById("total").innerText = "$100";
</script>

</body>
</html><!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Budget Chart - Arken Templates</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<style>
 let chart;

function initChart() {
  const ctx = document.getElementById('donut').getContext('2d');

  chart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: [],
      datasets: [{
        data: [],
        backgroundColor: [],
        borderWidth: 2,
        borderColor: '#fff'
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '62%',
      plugins: {
        legend: { display: false }
      }
    }
  });
}

function updateChart(data) {
  const totals = data?.totals || {};
  const categories = data?.categories || Object.keys(totals);

  const values = categories.map(c => totals[c] || 0);

  chart.data.labels = categories;
  chart.data.datasets[0].data = values;

  chart.data.datasets[0].backgroundColor = categories.map(
    (_, i) => `hsl(${i * 35}, 70%, 60%)`
  );

  chart.update();

  const total = values.reduce((a, b) => a + b, 0);
  document.getElementById('total-val').textContent =
    '$' + Math.round(total).toLocaleString();
}

async function loadData() {
  try {
    const res = await fetch('/api/get-budget?t=' + Date.now());

    if (!res.ok) throw new Error('API error: ' + res.status);

    const data = await res.json();
    updateChart(data);

  } catch (err) {
    console.error('Load failed:', err);

    document.getElementById('total-val').textContent = '$0';
  }
}

window.addEventListener('DOMContentLoaded', () => {
  initChart();
  loadData();
});
</script>

</body>
</html>
