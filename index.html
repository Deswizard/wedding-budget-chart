<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Budget Estimate Overview</title>
<style>
  * {
    box-sizing: border-box;
  }

  :root {
    --ink: #1a1a1a;
    --muted: #767676;
    --faint: #a7a7a7;
    --line: #e9e6df;
    --panel: #faf9f6;
    --white: #ffffff;
  }

  body {
    margin: 0;
    padding: 22px;
    background: var(--white);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  .wrap {
    width: 100%;
    max-width: 420px;
    margin: 0 auto;
  }

  .eyebrow {
    margin: 0 0 4px;
    color: var(--muted);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-align: center;
    text-transform: uppercase;
  }

  h1 {
    margin: 0 0 18px;
    color: #34302d;
    font-size: 17px;
    font-weight: 500;
    letter-spacing: 0;
    line-height: 1.25;
    text-align: center;
  }

  .total-box {
    margin-bottom: 16px;
    padding: 13px 14px 12px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--panel);
    text-align: center;
  }

  .total-label {
    margin-bottom: 2px;
    color: var(--muted);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .total-val {
    color: var(--ink);
    font-size: 25px;
    font-weight: 500;
    line-height: 1.15;
  }

  .chart-container {
    width: min(100%, 320px);
    height: 320px;
    margin: 0 auto 18px;
    padding: 8px;
    position: relative;
  }

  .status {
    min-height: 16px;
    margin: -4px 0 12px;
    color: var(--faint);
    font-size: 10px;
    text-align: center;
  }

  .breakdown {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin: 0 0 14px;
  }

  @media (max-width: 380px) {
    .breakdown {
      grid-template-columns: 1fr;
    }
  }

  .cat-row {
    display: grid;
    grid-template-columns: 11px minmax(0, 1fr) auto;
    align-items: center;
    gap: 9px;
    min-height: 33px;
    padding: 7px 10px;
    border-radius: 8px;
    background: #f7f7f5;
  }

  .cat-swatch {
    width: 11px;
    height: 11px;
    border-radius: 2px;
  }

  .cat-label {
    min-width: 0;
    overflow: hidden;
    color: #5d5a55;
    font-size: 11px;
    line-height: 1.2;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .cat-value {
    color: #2f2c29;
    font-size: 11px;
    font-variant-numeric: tabular-nums;
    font-weight: 500;
  }

  .note {
    margin: 11px 0 0;
    color: var(--faint);
    font-size: 10px;
    line-height: 1.45;
    text-align: center;
