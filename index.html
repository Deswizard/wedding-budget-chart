<script>
let chart;

function init() {
  const ctx = document.getElementById("chart");

  chart = new Chart(ctx, {
    type: "doughnut",
    data: {
      labels: [],
      datasets: [{
        data: [],
        backgroundColor: []
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false
    }
  });
}

async function loadData() {
  try {
    const res = await fetch("/api/get-budget?t=" + Date.now());

    if (!res.ok) {
      throw new Error("API returned " + res.status);
    }

    const data = await res.json();
    const totals = data.totals || {};

    const labels = Object.keys(totals);
    const values = Object.values(totals).map(Number);

    if (!labels.length) {
      document.getElementById("total").innerText = "$0";
      return;
    }

    chart.data.labels = labels;
    chart.data.datasets[0].data = values;
    chart.data.datasets[0].backgroundColor = labels.map(
      (_, i) => `hsl(${i * 40}, 70%, 60%)`
    );

    chart.update();

    const sum = values.reduce((a, b) => a + b, 0);
    document.getElementById("total").innerText = "$" + sum.toLocaleString();
  } catch (err) {
    console.error(err);
    document.getElementById("total").innerText = "Could not load budget";
  }
}

window.onload = () => {
  init();
  loadData();
};
</script>
