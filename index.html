<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Budget Chart - Arken Templates</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<style>
 let chart;

function initChart() {
  const ctx = document.getElementById('donut').getContext('2d');

  chart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: [],
      datasets: [{
        data: [],
        backgroundColor: [],
        borderWidth: 2,
        borderColor: '#fff'
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '62%',
      plugins: {
        legend: { display: false }
      }
    }
  });
}

function updateChart(data) {
  const totals = data?.totals || {};
  const categories = data?.categories || Object.keys(totals);

  const values = categories.map(c => totals[c] || 0);

  chart.data.labels = categories;
  chart.data.datasets[0].data = values;

  chart.data.datasets[0].backgroundColor = categories.map(
    (_, i) => `hsl(${i * 35}, 70%, 60%)`
  );

  chart.update();

  const total = values.reduce((a, b) => a + b, 0);
  document.getElementById('total-val').textContent =
    '$' + Math.round(total).toLocaleString();
}

async function loadData() {
  try {
    const res = await fetch('/api/get-budget?t=' + Date.now());

    if (!res.ok) throw new Error('API error: ' + res.status);

    const data = await res.json();
    updateChart(data);

  } catch (err) {
    console.error('Load failed:', err);

    document.getElementById('total-val').textContent = '$0';
  }
}

window.addEventListener('DOMContentLoaded', () => {
  initChart();
  loadData();
});
</script>

</body>
</html>
