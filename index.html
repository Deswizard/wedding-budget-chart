<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Budget Chart</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #ffffff; color: #1a1a1a; padding: 1.5rem; }
  h1 { font-size: 16px; font-weight: 500; color: #444; margin-bottom: 1.25rem; text-align: center; letter-spacing: 0.02em; }
  .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1.25rem; }
  .cat-row { display: flex; align-items: center; gap: 8px; background: #f7f7f7; border-radius: 8px; padding: 7px 10px; }
  .cat-swatch { width: 11px; height: 11px; border-radius: 2px; flex-shrink: 0; }
  .cat-label { font-size: 11px; color: #666; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cat-input { width: 68px; font-size: 11px; text-align: right; background: transparent; border: none; border-bottom: 0.5px solid #ccc; color: #1a1a1a; padding: 0 2px; outline: none; }
  .cat-input:focus { border-bottom-color: #534AB7; }
  .total-box { text-align: center; margin-bottom: 1rem; }
  .total-label { font-size: 11px; color: #888; margin-bottom: 2px; }
  .total-val { font-size: 22px; font-weight: 500; color: #1a1a1a; }
  .chart-container { position: relative; width: 100%; max-width: 320px; height: 320px; margin: 0 auto 1rem; }
  .legend { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 0.75rem; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #666; }
  .legend-dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }
  .note { text-align: center; font-size: 10px; color: #aaa; margin-top: 1rem; }
  @media (max-width: 480px) { .controls { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<h1>Wedding Budget Breakdown</h1>

<div class="controls" id="controls"></div>

<div class="total-box">
  <div class="total-label">Total Budget</div>
  <div class="total-val" id="total-val">$0</div>
</div>

<div class="chart-container">
  <canvas id="donut" role="img" aria-label="Donut chart showing wedding budget breakdown by category">Enter amounts in each category to see your budget distribution.</canvas>
</div>

<div class="legend" id="legend"></div>

<p class="note">Enter your amounts above. The chart updates automatically.</p>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const CATS = [
  { label: 'Ceremony Venue',            color: '#534AB7' },
  { label: 'Reception Venue',           color: '#185FA5' },
  { label: 'Catering',                  color: '#D85A30' },
  { label: 'Photography',               color: '#1D9E75' },
  { label: 'Videography',               color: '#0F6E56' },
  { label: 'Florals & Decor',           color: '#639922' },
  { label: 'DJ / Band',                 color: '#BA7517' },
  { label: 'Hair & Makeup',             color: '#D4537E' },
  { label: 'Attire & Rings',            color: '#993556' },
  { label: 'Transportation',            color: '#888780' },
  { label: 'Cake',                      color: '#EF9F27' },
  { label: 'Stationery',                color: '#378ADD' },
  { label: 'Rentals',                   color: '#5DCAA5' },
  { label: 'Honeymoon',                 color: '#7F77DD' },
  { label: 'Rehearsal Dinner',          color: '#AFA9EC' },
  { label: 'Bachelor / Bachelorette',   color: '#F0997B' },
  { label: 'Bridal Party Gifts',        color: '#ED93B1' },
  { label: 'Miscellaneous',             color: '#B4B2A9' },
];

const values = new Array(CATS.length).fill(0);

const controlsEl = document.getElementById('controls');
CATS.forEach((cat, i) => {
  const row = document.createElement('div');
  row.className = 'cat-row';
  row.innerHTML = `
    <span class="cat-swatch" style="background:${cat.color}"></span>
    <span class="cat-label" title="${cat.label}">${cat.label}</span>
    <input class="cat-input" type="number" min="0" step="100" placeholder="0" aria-label="${cat.label} budget amount" id="inp-${i}">
  `;
  controlsEl.appendChild(row);
  row.querySelector(`#inp-${i}`).addEventListener('input', e => {
    values[i] = parseFloat(e.target.value) || 0;
    update();
  });
});

const legendEl = document.getElementById('legend');
CATS.forEach(cat => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<span class="legend-dot" style="background:${cat.color}"></span>${cat.label}`;
  legendEl.appendChild(item);
});

const ctx = document.getElementById('donut').getContext('2d');
const chart = new Chart(ctx, {
  type: 'doughnut',
  data: {
    labels: CATS.map(c => c.label),
    datasets: [{
      data: new Array(CATS.length).fill(1),
      backgroundColor: CATS.map(c => c.color + '33'),
      borderWidth: 2,
      borderColor: '#ffffff',
      hoverOffset: 8,
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    cutout: '62%',
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: ctx => {
            const total = values.reduce((a, b) => a + b, 0);
            if (total === 0) return ` ${ctx.label}: $0 (0%)`;
            const pct = Math.round((values[ctx.dataIndex] / total) * 100);
            return ` ${ctx.label}: $${values[ctx.dataIndex].toLocaleString()} (${pct}%)`;
          }
        }
      }
    }
  }
});

function update() {
  const total = values.reduce((a, b) => a + b, 0);
  document.getElementById('total-val').textContent = '$' + Math.round(total).toLocaleString();
  const hasData = total > 0;
  chart.data.datasets[0].data = hasData ? values : new Array(CATS.length).fill(1);
  chart.data.datasets[0].backgroundColor = hasData
    ? CATS.map(c => c.color)
    : CATS.map(c => c.color + '33');
  chart.update();
}
</script>
</body>
</html>
