<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Budget Chart - Arken Templates</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #fff;
    color: #1a1a1a;
    padding: 1.5rem;
  }

  h1 {
    font-size: 16px;
    font-weight: 500;
    text-align: center;
    margin-bottom: 1rem;
    color: #444;
  }

  .btn {
    display: block;
    margin: 0 auto 1rem;
    padding: 6px 10px;
    font-size: 11px;
    border: 1px solid #ddd;
    border-radius: 6px;
    background: #fff;
    cursor: pointer;
  }

  .total-box {
    text-align: center;
    margin-bottom: 1rem;
  }

  .total-label {
    font-size: 11px;
    color: #888;
  }

  .total-val {
    font-size: 22px;
    font-weight: 500;
  }

  .chart-container {
    width: 100%;
    max-width: 320px;
    height: 320px;
    margin: 0 auto;
  }

  .note {
    text-align: center;
    font-size: 10px;
    color: #aaa;
    margin-top: 1rem;
  }
</style>
</head>

<body>

<h1>Wedding Budget Breakdown</h1>

<button class="btn" onclick="loadData()">Refresh from Notion</button>

<div class="total-box">
  <div class="total-label">Total Budget (Estimated)</div>
  <div class="total-val" id="total-val">$0</div>
</div>

<div class="chart-container">
  <canvas id="donut"></canvas>
</div>

<p class="note">
  This tracks estimated costs for planning purposes, not actual spending.
</p>

<script>
let chart;

const ctx = document.getElementById('donut').getContext('2d');

function initChart() {
  chart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: [],
      datasets: [{
        data: [],
        backgroundColor: [],
        borderWidth: 2,
        borderColor: '#fff'
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '62%',
      plugins: {
        legend: { display: false }
      }
    }
  });
}

function updateChart(data) {
  const totals = data.totals || {};
  const categories = data.categories || Object.keys(totals);

  const values = categories.map(c => totals[c] || 0);

  chart.data.labels = categories;
  chart.data.datasets[0].data = values;

  chart.data.datasets[0].backgroundColor = categories.map(
    (_, i) => `hsl(${i * 35}, 70%, 60%)`
  );

  chart.update();

  const total = values.reduce((a, b) => a + b, 0);
  document.getElementById('total-val').textContent =
    '$' + Math.round(total).toLocaleString();
}

async function loadData() {
  try {
    const res = await fetch('/api/get-budget?t=' + Date.now());
    const data = await res.json();
    updateChart(data);
  } catch (err) {
    console.error('Failed to load data', err);
  }
}

initChart();
loadData();
</script>

</body>
</html>
